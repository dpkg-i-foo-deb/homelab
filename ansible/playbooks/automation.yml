- name: Configure CI/CD tools
  hosts: automation_servers
  tags:
    - ci-cd-deploy
  vars:
    woodpecker_agent_secret: !vault |
      $ANSIBLE_VAULT;1.1;AES256
      32613033383632353363353334396533373939653536616135363332613335663434623464633762
      3139353135306236326139356535626331326433393939620a653534343366366638303861356532
      31336433653766346135306262393963306364373762643365316339396566363034656536366666
      3161363338333639620a356530616438373862383235616462303736396262633135643663363536
      36646462396333313161623133333164613838346634653537326334623563623430633964376132
      3535653662633734363065326137386434323162303238366364
    woodpecker_github_client_id: !vault |
      $ANSIBLE_VAULT;1.1;AES256
      39383334643032626338376137313761616566653466333833363736393766333961313065383861
      3133626234303037363332313163656534333862616530630a626438313239666435376336656436
      34383738363539643533326436346133383561626565656234663264373739653933656432383434
      6432343833336435610a353235393764633035633164346663623739326563326563343766313038
      31353934316262393462386432376264393762353164656530633335393530623836
    woodpecker_github_client_secret: !vault |
      $ANSIBLE_VAULT;1.1;AES256
      64306133633765366535366132373633356164626164333738373063313435613038613462303764
      6566343836313763353036366663393963636536626466390a353436626465346433633230313136
      39333865636530633764616137653836393962313533363663303139653636386336616464343265
      6339623538323638630a323031323434313436623631663432623130316262353334623839336466
      65366331386263373062366161333165356134366132646536383536363763303663333733633363
      3130363839623631616265366531333836626562653562663336
  tasks:

    - name: Ensure podman socket is enabled and running
      become: true
      become_user: '{{ container_user }}'
      ansible.builtin.systemd_service:
        name: podman.socket
        state: started
        masked: false
        scope: user
        enabled: true

    - name: Fetch container_user info
      ansible.builtin.getent:
        database: passwd
        key: "{{ container_user }}"

    - name: Deploy Woodpecker server
      ansible.builtin.import_role:
        name: dpkg_i_foo_deb.homelab.quadlet_service
      vars:
        quadlet_service_definition:
          name: woodpecker
          image: '{{ registry_host }}.{{ internet_host }}:5000/dockerhub/woodpeckerci/woodpecker-server:v3'
          registry_user: '{{ homelab_registry_user }}'
          registry_pass: '{{ homelab_registry_pass }}'
          user: '{{ container_user }}'
          ports:
            - '8000:8000'
            - '9000:9000'
          volumes:
            - name: 'woodpecker_data'
              dest: '/var/lib/woodpecker:z'
          env:
            WOODPECKER_OPEN: 'false'
            WOODPECKER_HOST: 'https://{{ cicd_host }}.{{ internet_host }}'
            WOODPECKER_GITHUB: 'true'
            WOODPECKER_AGENT_SECRET: '{{ woodpecker_agent_secret }}'
            WOODPECKER_GITHUB_CLIENT: '{{ woodpecker_github_client_id }}'
            WOODPECKER_GITHUB_SECRET: '{{ woodpecker_github_client_secret }}'
            WOODPECKER_ADMIN: 'dpkg-i-foo-deb'

    - name: Deploy Woodpecker agent
      ansible.builtin.import_role:
        name: dpkg_i_foo_deb.homelab.quadlet_service
      vars:
        quadlet_service_definition:
          name: woodpecker-agent
          command: agent
          image: '{{ registry_host }}.{{ internet_host }}:5000/dockerhub/woodpeckerci/woodpecker-agent:v3'
          registry_user: '{{ homelab_registry_user }}'
          registry_pass: '{{ homelab_registry_pass }}'
          user: '{{ container_user }}'
          volumes:
            - name: 'woodpecker_agent_data'
              dest: '/etc/woodpecker:z'
          file_mounts:
            - src: '/run/user/{{ getent_passwd[container_user][1] }}/podman/podman.sock'
              dest: '/var/run/docker.sock'
          env:
            WOODPECKER_SERVER: 'host.containers.internal:9000'
            WOODPECKER_BACKEND: 'docker'
            WOODPECKER_AGENT_SECRET: '{{ woodpecker_agent_secret }}'
