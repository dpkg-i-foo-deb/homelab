- name: Configure Homelab Registry
  hosts: registry_servers
  tags:
    - registry-deploy
  tasks:
    
    - name: Ensure there's a directory to store Zot configuration file
      become: true
      ansible.builtin.file:
        path: '/var/zot'
        state: directory
        mode: '0755'
        owner: '{{ container_user }}'
        group: '{{ container_user }}'

    - name: Template Zot configuration file
      become: true
      vars:
        registry_enable_ui: "true"
        registry_cve_update_interval: '24h'
      ansible.builtin.template:
        src: 'templates/zot/config.json.j2'
        dest: '/var/zot/config.json'
        owner: '{{ container_user }}'
        group: '{{ container_user }}'
        mode: '0755'

    - name: Template Zot authentication file
      become: true
      ansible.builtin.template:
        src: 'templates/zot/htpass.j2'
        dest: '/var/zot/htpass'
        owner: '{{ container_user }}'
        group: '{{ container_user }}'
        mode: '0755'

    - name: Template Zot sync credentials file
      become: true
      vars:
        registry_dockerhub_user: !vault |
          $ANSIBLE_VAULT;1.1;AES256
