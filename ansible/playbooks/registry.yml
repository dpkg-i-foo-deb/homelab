      ansible.builtin.template:
        src: 'templates/zot/sync-creds.json.j2'
        dest: '/var/zot/sync-creds.json'
        owner: '{{ container_user }}'
        group: '{{ container_user }}'
        mode: '0755'

    - name: Deploy Zot registry
      ansible.builtin.import_role:
        name: dpkg_i_foo_deb.homelab.quadlet_service
      vars:
        quadlet_service_definition:
          name: zot
          image: 'ghcr.io/project-zot/zot:latest'
          user: '{{ container_user }}'
          ports:
            - '5000:5000'
          dir_mounts:
            - src: '/var/zot'
              dest: '/etc/zot:z'
          volumes:
            - name: 'zot_data'
              dest: '/var/lib/registry:z'
