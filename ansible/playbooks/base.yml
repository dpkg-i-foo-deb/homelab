- name: Configure base dependencies for all instances
  hosts: all, !hypervisors
  tasks:
    - name: General virtual machine configuration
      ansible.builtin.import_role:
        name: dpkg_i_foo_deb.homelab.base
      vars:
        base_shell_prompt:
          - { path: '/home/{{ container_user }}/.bashrc', owner: '{{ container_user }}' }
          - { path: '/root/.bashrc', owner: 'root' }
