---
- name: Restart systemd service for {{ quadlet_service_definition.name }}
  become: true
  become_user: "{{ quadlet_service_definition.user }}"
  ansible.builtin.systemd_service:
    daemon_reload: "{{ quadlet_service_definition.daemon_reload | default(default_quadlet_service_daemon_reload) }}"
    state: "{{ quadlet_service_definition.state | default(default_quadlet_service_state) }}"
    name: "{{ quadlet_service_definition.name }}"
    scope: user

- name: Assert that {{ quadlet_service_definition.name }} service is running
  become: true
  become_user: "{{ quadlet_service_definition.user }}"
  ansible.builtin.systemd_service:
    name: "{{ quadlet_service_definition.name }}"
    scope: user
  register: service_status
  failed_when: service_status.status.ActiveState != "active"
